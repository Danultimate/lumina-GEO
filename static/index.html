<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumina-GEO</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      padding: 24px 32px;
      border-bottom: 1px solid #1e2330;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.3rem; font-weight: 600; letter-spacing: -0.02em; }
    header span {
      font-size: 0.75rem; background: #1a2540; color: #60a5fa;
      border: 1px solid #2d4a8a; padding: 2px 10px; border-radius: 999px;
    }

    main { max-width: 900px; margin: 48px auto; padding: 0 24px; }

    .input-card { background: #161b27; border: 1px solid #1e2330; border-radius: 12px; padding: 28px; }
    .input-card label {
      display: block; font-size: 0.8rem; font-weight: 500; color: #94a3b8;
      margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em;
    }
    .input-row { display: flex; gap: 12px; }
    .input-row input {
      flex: 1; background: #0f1117; border: 1px solid #2a3245; color: #e2e8f0;
      border-radius: 8px; padding: 12px 16px; font-size: 0.95rem; outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: #3b82f6; }
    .input-row input::placeholder { color: #3d4e6a; }
    .input-row button {
      background: #2563eb; color: #fff; border: none; border-radius: 8px;
      padding: 12px 28px; font-size: 0.95rem; font-weight: 600; cursor: pointer;
      white-space: nowrap; transition: background 0.2s;
    }
    .input-row button:hover { background: #1d4ed8; }
    .input-row button:disabled { background: #1e2d4a; color: #4a5e7a; cursor: not-allowed; }

    .spinner {
      display: none; margin: 40px auto; width: 36px; height: 36px;
      border: 3px solid #1e2330; border-top-color: #3b82f6;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      display: none; margin-top: 24px; background: #1f1215;
      border: 1px solid #7f1d1d; border-radius: 8px; padding: 16px 20px;
      color: #fca5a5; font-size: 0.9rem;
    }

    #report { display: none; margin-top: 36px; }

    /* PDF bar */
    .pdf-bar { display: flex; justify-content: flex-end; margin-bottom: 20px; }
    .pdf-btn {
      background: #161b27; color: #94a3b8; border: 1px solid #2a3245;
      border-radius: 8px; padding: 9px 20px; font-size: 0.85rem; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .pdf-btn:hover { background: #1e2740; color: #e2e8f0; border-color: #3b82f6; }
    .pdf-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Score banner */
    .score-banner {
      background: linear-gradient(135deg, #1a2540 0%, #0f1a35 100%);
      border: 1px solid #2d4a8a; border-radius: 12px; padding: 28px 32px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .score-banner .meta { font-size: 0.85rem; color: #64748b; margin-top: 4px; }
    .score-banner .target { font-size: 1rem; font-weight: 500; word-break: break-all; }
    .score-circle { text-align: center; min-width: 90px; }
    .score-circle .num { font-size: 2.4rem; font-weight: 700; line-height: 1; }
    .score-circle .label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.08em; }

    /* Platform scores */
    .platform-scores { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .platform-card {
      background: #161b27; border: 1px solid #1e2330; border-radius: 10px;
      padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
    }
    .platform-card .p-name { font-size: 0.82rem; color: #94a3b8; font-weight: 500; }
    .platform-card .p-score { font-size: 1.6rem; font-weight: 700; line-height: 1; }

    /* AI Access banner */
    .ai-access-banner {
      border-radius: 10px; padding: 14px 20px; margin-bottom: 16px;
      display: flex; align-items: flex-start; gap: 12px; font-size: 0.88rem;
    }
    .ai-access-banner.critical { background: #1f1215; border: 1px solid #7f1d1d; color: #fca5a5; }
    .ai-access-banner.ok { background: #051a10; border: 1px solid #065f46; color: #6ee7b7; }
    .ai-access-banner .icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
    .ai-access-banner .content { flex: 1; }
    .ai-access-banner .content strong { display: block; margin-bottom: 4px; font-size: 0.9rem; }
    .ai-access-banner .blocked-list { margin-top: 6px; }
    .ai-access-banner .blocked-list li { list-style: none; margin-top: 3px; font-size: 0.83rem; opacity: 0.85; }
    .ai-access-banner.hidden { display: none; }

    /* Lens cards */
    .lenses { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
    .lens-card { background: #161b27; border: 1px solid #1e2330; border-radius: 10px; padding: 18px; }
    .lens-card h3 {
      font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.07em; color: #94a3b8; margin-bottom: 8px;
    }
    .lens-score { font-size: 1.9rem; font-weight: 700; line-height: 1; margin-bottom: 10px; }

    /* Detail cards */
    .detail-card { background: #161b27; border: 1px solid #1e2330; border-radius: 10px; padding: 20px 24px; margin-bottom: 14px; }
    .detail-card h2 {
      font-size: 0.95rem; font-weight: 600; margin-bottom: 16px; padding-bottom: 12px;
      border-bottom: 1px solid #1e2330; display: flex; align-items: center; gap: 10px;
    }
    .detail-card h2 .badge {
      font-size: 0.7rem; background: #1a2540; color: #60a5fa;
      border: 1px solid #2d4a8a; padding: 2px 8px; border-radius: 999px; font-weight: 500;
    }

    .section-label {
      font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: #475569; margin-bottom: 8px; margin-top: 16px;
    }
    .section-label:first-of-type { margin-top: 0; }

    /* Authority signals row */
    .authority-flags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
    .flag { font-size: 0.75rem; padding: 3px 10px; border-radius: 999px; font-weight: 500; }
    .flag-yes { background: #052e16; color: #34d399; border: 1px solid #065f46; }
    .flag-no  { background: #1a1010; color: #f87171; border: 1px solid #7f1d1d; }

    ul.items { list-style: none; }
    ul.items li {
      font-size: 0.88rem; color: #cbd5e1; padding: 6px 0 6px 16px;
      border-bottom: 1px solid #1a2030; position: relative; line-height: 1.5;
    }
    ul.items li:last-child { border-bottom: none; }
    ul.items li::before { content: "·"; position: absolute; left: 4px; color: #3b82f6; }
    ul.items.fixes li::before { color: #f87171; content: "!"; font-weight: 700; }
    ul.items.gaps li::before  { color: #fbbf24; content: "△"; font-size: 0.7rem; top: 8px; }

    .pill { display: inline-block; font-size: 0.75rem; padding: 3px 10px; border-radius: 999px; font-weight: 500; }
    .pill-green { background: #052e16; color: #34d399; border: 1px solid #065f46; }
    .pill-red   { background: #2d0a0a; color: #f87171; border: 1px solid #7f1d1d; }
    .empty { font-size: 0.85rem; color: #334155; font-style: italic; }

    .score-high { color: #34d399; }
    .score-mid  { color: #fbbf24; }
    .score-low  { color: #f87171; }

    @media (max-width: 720px) {
      .lenses { grid-template-columns: repeat(2, 1fr); }
      .platform-scores { grid-template-columns: 1fr; }
      .score-banner { flex-direction: column; gap: 20px; text-align: center; }
    }
    @media (max-width: 480px) {
      .lenses { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>Lumina-GEO</h1>
  <span>GEO Audit</span>
</header>

<main>
  <div class="input-card">
    <label>Website URL or repository path</label>
    <div class="input-row">
      <input type="text" id="target" placeholder="https://example.com" autocomplete="off" />
      <button id="run-btn" onclick="runAudit()">Run Audit</button>
    </div>
  </div>

  <div class="spinner" id="spinner"></div>
  <div class="error-box" id="error-box"></div>
  <div class="pdf-bar" id="pdf-bar" style="display:none">
    <button class="pdf-btn" id="pdf-btn" onclick="downloadPdf()">&#8595; Download PDF</button>
  </div>
  <div id="report"></div>
</main>

<script>
  async function runAudit() {
    const target = document.getElementById("target").value.trim();
    if (!target) return;

    const btn    = document.getElementById("run-btn");
    const spinner = document.getElementById("spinner");
    const errBox  = document.getElementById("error-box");
    const report  = document.getElementById("report");

    btn.disabled = true; btn.textContent = "Running…";
    spinner.style.display = "block";
    errBox.style.display = "none";
    document.getElementById("pdf-bar").style.display = "none";
    report.style.display = "none"; report.innerHTML = "";

    try {
      const res = await fetch("/audit", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ target })
      });
      if (!res.ok) {
        let detail = `HTTP ${res.status}`;
        try { detail = (await res.json()).detail || detail; } catch {}
        throw new Error(detail);
      }
      renderReport(await res.json());
    } catch (e) {
      errBox.textContent = "Error: " + e.message;
      errBox.style.display = "block";
    } finally {
      btn.disabled = false; btn.textContent = "Run Audit";
      spinner.style.display = "none";
    }
  }

  document.getElementById("target").addEventListener("keydown", e => {
    if (e.key === "Enter") runAudit();
  });

  const sc = s => s >= 7 ? "score-high" : s >= 4 ? "score-mid" : "score-low";

  function listItems(arr, cls = "") {
    if (!arr || arr.length === 0) return `<span class="empty">None</span>`;
    return `<ul class="items ${cls}">${arr.map(i => `<li>${esc(i)}</li>`).join("")}</ul>`;
  }

  function esc(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function flag(val, label) {
    return `<span class="flag ${val ? 'flag-yes' : 'flag-no'}">${val ? "✓" : "✗"} ${label}</span>`;
  }

  function renderReport(d) {
    const report = document.getElementById("report");
    const cs   = d.composite_score;
    const date = new Date(d.generated_at).toLocaleString();
    const ai   = d.ai_access;
    const ps   = d.platform_scores;

    const aiBlock = ai.checked
      ? ai.critical
        ? `<div class="ai-access-banner critical">
            <div class="icon">⚠</div>
            <div class="content">
              <strong>AI Bot Access — CRITICAL: bots are blocked</strong>
              <ul class="blocked-list">${ai.blocked_bots.map(b => `<li>• ${esc(b)}</li>`).join("")}</ul>
            </div>
           </div>`
        : `<div class="ai-access-banner ok">
            <div class="icon">✓</div>
            <div class="content"><strong>AI Bot Access — All major AI crawlers allowed</strong></div>
           </div>`
      : "";

    report.innerHTML = `
      <div id="pdf-content"><div class="score-banner">
        <div>
          <div class="target">${esc(d.url_or_path)}</div>
          <div class="meta">Audited on ${date}</div>
        </div>
        <div class="score-circle">
          <div class="num ${sc(cs)}">${cs.toFixed(1)}</div>
          <div class="label">/ 10 &nbsp; GEO Score</div>
        </div>
      </div>

      <div class="platform-scores">
        <div class="platform-card">
          <div class="p-name">Google AI Overviews</div>
          <div class="p-score ${sc(ps.google_ai_overviews)}">${ps.google_ai_overviews.toFixed(1)}<span style="font-size:1rem;color:#475569">/10</span></div>
        </div>
        <div class="platform-card">
          <div class="p-name">ChatGPT / Perplexity</div>
          <div class="p-score ${sc(ps.chatgpt_perplexity)}">${ps.chatgpt_perplexity.toFixed(1)}<span style="font-size:1rem;color:#475569">/10</span></div>
        </div>
      </div>

      ${aiBlock}

      <div class="lenses">
        <div class="lens-card">
          <h3>Grounding</h3>
          <div class="lens-score ${sc(d.grounding.score)}">${d.grounding.score}<span style="font-size:0.9rem;color:#475569">/10</span></div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <span class="pill ${d.grounding.is_groundable ? 'pill-green' : 'pill-red'}">${d.grounding.is_groundable ? "Groundable" : "Not Groundable"}</span>
            <span class="pill pill-green" style="background:#0a1f14;color:#6ee7b7;border-color:#065f46">Citation ${d.grounding.citation_probability}/10</span>
          </div>
        </div>
        <div class="lens-card">
          <h3>Semantic Hierarchy</h3>
          <div class="lens-score ${sc(d.semantic_hierarchy.score)}">${d.semantic_hierarchy.score}<span style="font-size:0.9rem;color:#475569">/10</span></div>
          <div style="font-size:0.82rem;color:#64748b">${d.semantic_hierarchy.logic_breaks.length} logic break${d.semantic_hierarchy.logic_breaks.length !== 1 ? "s" : ""}</div>
        </div>
        <div class="lens-card">
          <h3>Answer-First</h3>
          <div class="lens-score ${sc(d.answer_first.score)}">${d.answer_first.score}<span style="font-size:0.9rem;color:#475569">/10</span></div>
          <div style="font-size:0.82rem;color:#64748b">${d.answer_first.missing_definitions.length} missing definition${d.answer_first.missing_definitions.length !== 1 ? "s" : ""}</div>
        </div>
        <div class="lens-card">
          <h3>Authority</h3>
          <div class="lens-score ${sc(d.authority.score)}">${d.authority.score}<span style="font-size:0.9rem;color:#475569">/10</span></div>
          <div style="font-size:0.82rem;color:#64748b">${d.authority.authority_signals.length} signal${d.authority.authority_signals.length !== 1 ? "s" : ""} found</div>
        </div>
      </div>

      <div class="detail-card">
        <h2>Grounding <span class="badge">${d.grounding.score}/10</span></h2>
        <div class="section-label">Findings</div>${listItems(d.grounding.findings)}
        <div class="section-label">Critical Fixes (by impact)</div>${listItems(d.grounding.critical_fixes, "fixes")}
        <div class="section-label">Schema Gaps</div>${listItems(d.grounding.schema_gaps, "gaps")}
      </div>

      <div class="detail-card">
        <h2>Semantic Hierarchy <span class="badge">${d.semantic_hierarchy.score}/10</span></h2>
        <div class="section-label">Findings</div>${listItems(d.semantic_hierarchy.findings)}
        <div class="section-label">Critical Fixes (by impact)</div>${listItems(d.semantic_hierarchy.critical_fixes, "fixes")}
        <div class="section-label">Logic Breaks</div>${listItems(d.semantic_hierarchy.logic_breaks, "gaps")}
      </div>

      <div class="detail-card">
        <h2>Answer-First <span class="badge">${d.answer_first.score}/10</span></h2>
        <div class="section-label">Findings</div>${listItems(d.answer_first.findings)}
        <div class="section-label">Critical Fixes (by impact)</div>${listItems(d.answer_first.critical_fixes, "fixes")}
        <div class="section-label">Missing Definitions</div>${listItems(d.answer_first.missing_definitions, "gaps")}
      </div>

      <div class="detail-card">
        <h2>Authority <span class="badge">${d.authority.score}/10</span></h2>
        <div class="authority-flags">
          ${flag(d.authority.has_named_author, "Named Author")}
          ${flag(d.authority.has_statistics, "Statistics")}
          ${flag(d.authority.has_expert_quotes, "Expert Quotes")}
          ${flag(d.authority.has_date_signals, "Date Signals")}
          ${flag(d.authority.has_external_citations, "External Citations")}
        </div>
        <div class="section-label" style="margin-top:14px">Authority Signals</div>${listItems(d.authority.authority_signals)}
        <div class="section-label">Findings</div>${listItems(d.authority.findings)}
        <div class="section-label">Critical Fixes (by impact)</div>${listItems(d.authority.critical_fixes, "fixes")}
      </div>
      </div>
    `;

    report.style.display = "block";
    document.getElementById("pdf-bar").style.display = "flex";
  }

  async function downloadPdf() {
    const btn     = document.getElementById("pdf-btn");
    const content = document.getElementById("pdf-content");
    const target  = document.getElementById("target").value.trim();

    btn.disabled = true; btn.textContent = "Generating…";

    const hostname = target.replace(/https?:\/\//,"").replace(/[^a-z0-9]/gi,"-").replace(/-+$/,"");

    const opt = {
      margin:      [8, 8, 8, 8],
      filename:    `lumina-geo-${hostname}.pdf`,
      image:       { type: "jpeg", quality: 0.98 },
      html2canvas: {
        scale: 2, backgroundColor: "#ffffff", useCORS: true, logging: false,
        onclone: (doc) => {
          doc.querySelectorAll("*").forEach(el => {
            el.style.letterSpacing = "normal";
            el.style.wordSpacing   = "normal";
          });
          const s = doc.createElement("style");
          s.textContent = `
            * { font-family: Arial, Helvetica, sans-serif !important; }
            body, main, #pdf-content { background: #ffffff !important; }
            .score-banner { background: #eef2ff !important; border-color: #c7d2fe !important; }
            .score-banner .target { color: #0f172a !important; }
            .score-banner .meta, .score-circle .label { color: #64748b !important; }
            .platform-card, .lens-card, .detail-card { background: #f8fafc !important; border-color: #e2e8f0 !important; }
            .platform-card .p-name, .lens-card h3 { color: #475569 !important; }
            .detail-card h2 { color: #0f172a !important; border-color: #e2e8f0 !important; }
            .badge { background: #dbeafe !important; color: #1d4ed8 !important; border-color: #93c5fd !important; }
            .section-label { color: #94a3b8 !important; }
            ul.items li { color: #1e293b !important; border-color: #e2e8f0 !important; }
            ul.items li::before { color: #3b82f6 !important; }
            ul.items.fixes li::before { color: #ef4444 !important; }
            ul.items.gaps li::before { color: #f59e0b !important; }
            .pill-green, .flag-yes { background: #dcfce7 !important; color: #166534 !important; border-color: #86efac !important; }
            .pill-red, .flag-no { background: #fee2e2 !important; color: #991b1b !important; border-color: #fca5a5 !important; }
            .ai-access-banner.ok { background: #f0fdf4 !important; border-color: #86efac !important; color: #166534 !important; }
            .ai-access-banner.critical { background: #fff1f2 !important; border-color: #fca5a5 !important; color: #991b1b !important; }
            .empty { color: #94a3b8 !important; }
            .score-banner, .platform-scores, .lenses, .ai-access-banner { break-inside: avoid; page-break-inside: avoid; }
            .detail-card h2 { break-after: avoid; page-break-after: avoid; }
            .detail-card { break-before: auto; page-break-before: auto; }
          `;
          doc.head.appendChild(s);
        }
      },
      jsPDF:     { unit: "mm", format: "a4", orientation: "portrait" },
      pagebreak: { mode: ["avoid-all", "css"] }
    };

    await html2pdf().set(opt).from(content).save();
    btn.disabled = false; btn.innerHTML = "&#8595; Download PDF";
  }
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</body>
</html>
